{% extends "base.html" %}

{% block content %}

<style>

/* Page */
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
    margin: 0;
    padding: 0;
}

/* Title */
.page-title {
    text-align: center;
    font-size: 32px;
    margin: 25px 0;
    color: #2c3e50;
    font-weight: 700;
}

/* Container */
#recentNotifications {
    max-width: 1100px;
    margin: auto;
    padding: 10px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* Card */
.update-card {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    border-left: 6px solid #0d6efd;
    box-shadow: 0 6px 16px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.update-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.15);
}

/* Job Title */
.job-title {
    font-size: 20px;
    color: #0d6efd;
    font-weight: 600;
    margin-bottom: 15px;
}

/* Grid Layout (KEY FIX) */
.job-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin-bottom: 15px;
}

/* Each Item Block */
.job-item {
    background: #f8f9fa;
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 14px;
}

/* Label */
.job-item strong {
    display: block;
    color: #555;
    font-size: 13px;
}

/* Value */
.job-item span {
    color: #111;
    font-weight: 500;
}

/* Content Box */
.job-content-box {
    margin-top: 10px;
    padding: 12px;
    background: #eef3ff;
    border-radius: 8px;
    max-height: 180px;
    overflow-y: auto;
    font-size: 14px;
}

/* Last Date */
.last-date {
    color: #e63946;
    font-weight: bold;
}

/* Button */
.apply-btn {
    margin-top: 15px;
    background: linear-gradient(135deg,#007bff,#0047b3);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    transition: 0.3s;
}

.apply-btn:hover {
    transform: scale(1.05);
}

/* Responsive */
@media(max-width:700px){
    .job-grid {
        grid-template-columns: 1fr;
    }
}

</style>


<h1 class="page-title">Karnataka Government Jobs</h1>

<div id="recentNotifications"></div>


<script>

let maxCards = 30;

function loadCategoryJobs(categoryName){

fetch("/api/jobs")
.then(res => res.json())
.then(data => {

let container = document.getElementById("recentNotifications");
container.innerHTML = "Loading jobs...";

let filtered = data
.reverse()
.filter(job => job.category && job.category.toLowerCase().trim() === categoryName.toLowerCase().trim())
.slice(0, maxCards);

container.innerHTML = "";

filtered.forEach(job => {

let card = document.createElement("div");
card.className = "update-card";

card.innerHTML = `

<div class="job-title">${job.post_name}</div>

<div class="job-grid">

<div class="job-item">
<strong>Organization</strong>
<span>${job.organization}</span>
</div>

<div class="job-item">
<strong>Vacancy</strong>
<span>${job.vacancy}</span>
</div>

<div class="job-item">
<strong>Qualification</strong>
<span>${job.qualification}</span>
</div>

<div class="job-item">
<strong>Salary</strong>
<span>${job.salary}</span>
</div>

<div class="job-item">
<strong>Last Date</strong>
<span class="last-date">${job.last_date}</span>
</div>

</div>

<div class="job-content-box">
<strong>Job Details:</strong><br>
${job.content || "No details available"}
</div>

<button onclick="redirectToUpdate('${job.id}')" class="apply-btn">
Apply Now
</button>

`;

container.appendChild(card);

});

});

}

function redirectToUpdate(id){
window.location.href = "updation.html?id=" + id;
}

document.addEventListener("DOMContentLoaded", function(){
loadCategoryJobs("Karnataka");
});

</script>

{% endblock %}
