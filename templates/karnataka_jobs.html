<!DOCTYPE html>
<html>
<head>
<title>Karnataka Jobs</title>
</head>

<body>

<h1>Karnataka Government Jobs</h1>

<div id="recentNotifications"></div>

<script>

function loadCategoryJobs(categoryName){

fetch("/api/jobs")
.then(res => res.json())
.then(data => {

let container = document.getElementById("recentNotifications");
container.innerHTML="";

data.reverse().forEach(job => {

if(job.category && job.category.toLowerCase().trim() === categoryName.toLowerCase().trim()){

let card=document.createElement("div");
card.className="update-card";

card.innerHTML=`

<h2>${job.post_name}</h2>

<p>
<strong>Organization:</strong> ${job.organization}<br>
<strong>Vacancy:</strong> ${job.vacancy}<br>
<strong>Qualification:</strong> ${job.qualification}<br>
<strong>Salary:</strong> ${job.salary}<br>
<strong>Last Date:</strong> ${job.last_date}
</p>

<button onclick="redirectToUpdate('${job.id}')" class="apply-btn">
Apply Now
</button>

`;

container.prepend(card);

}

});

});

}

function redirectToUpdate(id){
window.location.href="updation.html?id="+id;
}

document.addEventListener("DOMContentLoaded", function(){

loadCategoryJobs("Karnataka");   // 👈 Specify category here

});

</script>

</body>
</html>
