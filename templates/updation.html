{% extends "base.html" %}

{% block content %}


<style>
		body {
			font-family: Arial, sans-serif;
			background-color: #f4f6f9;
			margin: 0;
			padding: 20px;
		}

		.updates-container {
			max-width: 900px;
			margin: auto;
		}

		.update-card {
			background: #ffffff;
			padding: 20px;
			margin-bottom: 20px;
			border-radius: 8px;
			box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
			transition: transform 0.2s ease, box-shadow 0.2s ease;
		}

		.update-card:hover {
			transform: translateY(-3px);
			box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
		}

		.update-card h2 {
			margin-top: 0;
			color: #2c3e50;
		}

		.update-card p {
			color: #555;
			line-height: 1.6;
		}

		.update-card h3 {
			margin-top: 15px;
			color: #34495e;
		}

		.update-card ul {
			padding-left: 20px;
		}

		.update-card ul li {
			margin-bottom: 8px;
		}

		.update-card a {
			text-decoration: none;
			color: #007bff;
		}

		.update-card a:hover {
			text-decoration: underline;
		}

		.related-section {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-top: 15px;
    }

    .related-section h3 {
        margin: 0;
        color: #333;
        min-width: 140px;
    }

    .related-links {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .related-links li {
        display: inline-block;
    }

    .related-links a {
        display: inline-block;
        padding: 8px 16px;
        background-color: #e74c3c; /* Red */
        color: #fff;
        text-decoration: none;
        border-radius: 20px; /* Curved edges */
        font-size: 14px;
        transition: background 0.3s ease, transform 0.2s ease;
    }

    .related-links a:hover {
        background-color: #c0392b;
        transform: scale(1.05);
    }

	/* -------------------------------------------- Job Details updating via API */

	.update-card{
	background:#fff;
	border-radius:8px;
	padding:20px;
	margin-bottom:20px;
	box-shadow:0 2px 8px rgba(0,0,0,0.1);
	border-left:5px solid #007BFF;
	}

	.update-card h2{
	margin-top:0;
	font-size:20px;
	color:#333;
	}

	.update-card p{
	line-height:1.6;
	color:#555;
	}

	.related-section{
	margin-top:15px;
	}

	.related-section h3{
	font-size:16px;
	margin-bottom:10px;
	color:#444;
	}

	.related-links{
	list-style:none;
	padding:0;
	}

	.related-links li{
	margin-bottom:5px;
	}

	.related-links a{
	text-decoration:none;
	color:#007BFF;
	}

	.apply-btn{
	background:red;
	color:white;
	padding:10px 18px;
	border:none;
	border-radius:6px;
	cursor:pointer;
	font-weight:bold;
	}

	.apply-btn:hover{
	background:#cc0000;
	}


</style>


	<script>

		function getSequenceID(){

		const params = new URLSearchParams(window.location.search);
		return params.get("seq");

		}

		function loadNotifications(){

		fetch("/api/jobs")
		.then(res => res.json())
		.then(data => {

		let container = document.getElementById("recentNotifications");
		container.innerHTML = "";

		let seq = getSequenceID();

		let job = data.find(j => j.sequence_id === seq);

		if(!job){
		container.innerHTML="<p>Job not found</p>";
		return;
		}

		let card=document.createElement("div");
		card.className="update-card";

		card.innerHTML=`

		<h2>📢 ${job.post_name}</h2>

		<p>
		<strong>Organization:</strong> ${job.organization}<br>
		<strong>Vacancy:</strong> ${job.vacancy}<br>
		<strong>Qualification:</strong> ${job.qualification}<br>
		<strong>Salary:</strong> ${job.salary}<br>
		<strong>Details:</strong> ${job.content}<br>
		<strong>Last Date:</strong> ${job.last_date}
		</p>

		<div class="related-section">
		<h3>Apply</h3>

		<button onclick="window.open('${job.apply_link}','_blank')" class="apply-btn">
		Apply Now
		</button>

		</div>

		`;

		container.appendChild(card);

		});

		}

		document.addEventListener("DOMContentLoaded",loadNotifications);

	</script>

{% endblock %}
